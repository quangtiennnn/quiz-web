<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Website</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Quiz</h1>
        <div id="quiz-container">
            <div id="loading">Loading questions...</div>
            <div id="quiz" style="display: none;">
                <div id="progress">Question <span id="current">1</span> of <span id="total">0</span></div>
                <h2 id="question"></h2>
                <div id="answers" class="answers"></div>
                <button id="next-btn" onclick="nextQuestion()" style="display: none;">Next Question</button>
            </div>
            <div id="results" style="display: none;">
                <h2>Quiz Complete!</h2>
                <p>You got <span id="score">0</span> out of <span id="total-questions">0</span> correct.</p>
                <button onclick="location.reload()">Try Again</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
