<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Time!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <script>
        const CHAPTER = "{{ chapter }}";
    </script>

    <div class="container">
        <div class="quiz-nav">
            <a href="/" class="back-btn">← Home</a>
            <span class="chapter-badge" id="chapter-badge"></span>
        </div>

        <div class="header">
            <div class="star">⭐</div>
            <h1>Quiz Time!</h1>
            <div class="star">⭐</div>
        </div>

        <div id="quiz-container">
            <div id="loading">
                <div class="loading-spinner"></div>
                <p>Loading questions...</p>
            </div>

            <div id="quiz" style="display: none;">
                <div class="progress-bar-wrap">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div id="progress">Question <span id="current">1</span> of <span id="total">0</span></div>
                <div class="question-card">
                    <p id="question"></p>
                </div>
                <div id="answers" class="answers"></div>
                <button id="next-btn" onclick="nextQuestion()" style="display: none;">
                    Next ➜
                </button>
            </div>

            <div id="results" style="display: none;">
                <div class="result-emoji" id="result-emoji">🎉</div>
                <h2 id="result-title">Quiz Complete!</h2>
                <div class="score-card">
                    <span class="score-num" id="score">0</span>
                    <span class="score-sep">/</span>
                    <span class="score-total" id="total-questions">30</span>
                </div>
                <p class="score-label" id="score-label"></p>
                <div class="result-actions">
                    <button onclick="location.reload()">🔄 Try Again</button>
                    <a href="/" class="btn-home">🏠 Home</a>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
